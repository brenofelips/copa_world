services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  kafka:
    image: ${KAFKA_IMAGE}
    hostname: kafka
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1
      start_period: 20s
      interval: 5s
      timeout: 10s
      retries: 20
    ports:
      - "${KAFKA_HOST_PORT}:9092"

  kafka-init:
    image: ${KAFKA_IMAGE}
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh --create
        --if-not-exists
        --bootstrap-server ${KAFKA_BROKERS}
        --partitions ${KAFKA_TOPIC_PARTITIONS}
        --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR}
        --topic ${KAFKA_TOPIC}

  redis:
    image: ${REDIS_IMAGE}
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${REDIS_HOST_PORT}:6379"

  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT}:5432"

  postgres-replica-1:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Load Balancer (Ingestion API) ────────────────────────────────────────────

  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingestion-api-1
      - ingestion-api-2

  # ─── Ingestion API (2 instances behind Nginx) ─────────────────────────────────

  ingestion-api-1:
    build: ./services/ingestion-api
    environment:
      PORT: ${INGESTION_API_PORT}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  ingestion-api-2:
    build: ./services/ingestion-api
    environment:
      PORT: ${INGESTION_API_PORT}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # ─── Score Service (Kafka → Redis) ────────────────────────────────────────────

  score-service-1:
    build: ./services/score-service
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  score-service-2:
    build: ./services/score-service
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ─── Event Service (Kafka → PostgreSQL) ───────────────────────────────────────

  event-service-1:
    build: ./services/event-service
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  event-service-2:
    build: ./services/event-service
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ─── Web Server (REST + SSE) ───────────────────────────────────────────────────

  web-server:
    build: ./services/web-server
    ports:
      - "${WEB_SERVER_HOST_PORT}:${WEB_SERVER_PORT}"
    environment:
      PORT: ${WEB_SERVER_PORT}
      REDIS_ADDR: ${REDIS_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Data Provider (API-Football → Ingestion API) ────────────────────────────

  data-provider:
    build: ./services/data-provider
    environment:
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      INGESTION_URL: ${INGESTION_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      POLL_INTERVAL: ${POLL_INTERVAL}
      SCHEDULE_INTERVAL: ${SCHEDULE_INTERVAL}
      LEAGUE_ID: ${LEAGUE_ID}
      SEASON: ${SEASON}
    depends_on:
      redis:
        condition: service_healthy
      nginx:
        condition: service_started

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    environment:
      NEXT_PUBLIC_WEB_SERVER_URL: ${NEXT_PUBLIC_WEB_SERVER_URL}
    depends_on:
      - web-server

volumes:
  kafka_data:
  redis_data:
  postgres_data:
  postgres_replica1_data:
